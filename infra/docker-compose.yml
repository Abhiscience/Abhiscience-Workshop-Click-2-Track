# Docker Compose for Local Development

version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: workshop-db
    environment:
      POSTGRES_DB: workshop_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Redis for Caching/Queue
  redis:
    image: redis:7-alpine
    container_name: workshop-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # MinIO for Object Storage (images)
  minio:
    image: minio/minio:latest
    container_name: workshop-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  # API Backend
  api:
    build:
      context: ../services/api
      dockerfile: ../../Dockerfile.api
    container_name: workshop-api
    depends_on:
      - db
      - redis
      - minio
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/workshop_db
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      DEBUG: "true"
    ports:
      - "8001:8000"
    volumes:
      - ../services/api:/app
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data: